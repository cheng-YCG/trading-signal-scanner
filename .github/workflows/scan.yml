name: 交易信号扫描

on:
  schedule:
    # 每15分钟运行一次 (UTC时间)
    - cron: '*/15 * * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行扫描
        run: python scanner.py
